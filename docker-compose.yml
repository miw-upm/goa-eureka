services:
  goa-eureka:
    container_name: goa-eureka
    build: .
    image: goa-eureka:latest
    restart: always
    ports:
      - "8761:8761"
    networks:
      - goa

networks:
  goa:
    external: true

#> docker network create goa
#> docker compose up --build -d
# Para ver los logs de arranque
#> docker logs -f goa-eureka
